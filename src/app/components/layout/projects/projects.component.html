<!-- Projects Section -->
<section class="py-24 bg-gray-50 h-screen" id="projects">
  <div class="max-w-7xl mx-auto px-6">
    <div
      class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-16"
    >
      <div class="max-w-2xl">
        <h2
          class="text-3xl md:text-4xl font-black tracking-tight text-slate-900 mb-4"
        >
          Featured Projects
        </h2>
        <p class="text-slate-500 text-lg">
          A selection of digital solutions focused on performance and
          scalability.
        </p>
      </div>
      <div class="h-px flex-grow bg-slate-200 hidden md:block mx-8 mb-4"></div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      @for (
        card of getFeaturedProjects();
        track trackByProjectId(card.id, card)
      ) {
        <div
          class="group bg-white rounded-xl border border-slate-100 overflow-hidden shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300"
        >
          <div class="aspect-video relative overflow-hidden bg-slate-100">
            <img
              class="w-full object-cover group-hover:scale-105 transition-transform duration-500"
              [src]="card.imageUrl"
              [alt]="card.title"
            />
          </div>
          <div class="p-6">
            <div class="flex flex-wrap gap-2 mb-4">
              @for (tag of card.tags; track tag) {
                <span
                  class="px-2 py-0.5 bg-slate-100 text-slate-600 text-[10px] font-bold uppercase rounded"
                >
                  {{ tag }}
                </span>
              }
            </div>
            <h3 class="text-xl font-bold text-slate-900 mb-2">
              {{ card.title }}
            </h3>
            <p class="text-slate-500 text-sm mb-6 line-clamp-2">
              {{ card.description }}
            </p>
            <a
              class="inline-flex items-center gap-2 text-primary font-bold text-sm group/btn"
              [href]="card.projectUrl"
              target="_blank"
              rel="noopener noreferrer"
            >
              View Project
              <img
                src="/assets/icons/arrow-right.svg"
                class="w-5 h-5 group-hover/btn:translate-x-1 transition-transform"
                alt="Arrow icon"
              />
            </a>
          </div>
        </div>
      }
      <div class="mt-12 flex justify-center md:col-span-2 lg:col-span-3">
        <a
          class="inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-black text-white font-bold hover:bg-blue-600 transition-colors center"
          routerLink="/projects"
        >
          View more
        </a>
      </div>
    </div>
  </div>
</section>
