<section class="py-20 bg-gray-50 min-h-screen" id="all-projects">
  <div class="max-w-7xl mx-auto px-6">
    <div
      class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-16"
    >
      <div class="max-w-2xl">
        <h1
          class="text-3xl md:text-4xl font-black tracking-tight text-slate-900 mb-4"
        >
          All Projects
        </h1>
        <p class="text-slate-500 text-lg">
          Explore the complete project list and open each repository or website.
        </p>
      </div>
      <a
        class="inline-flex items-center gap-2 px-5 py-2.5 rounded-lg border border-slate-300 text-slate-700 hover:bg-slate-100 transition-colors"
        routerLink="/"
      >
        Back to Home
      </a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      @for (
        project of projects$ | async;
        track trackByProjectId($index, project)
      ) {
        <div
          class="group bg-white rounded-xl border border-slate-100 overflow-hidden shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all duration-300"
        >
          <div class="aspect-video relative overflow-hidden bg-slate-100">
            <img
              class="w-full object-cover group-hover:scale-105 transition-transform duration-500"
              [src]="project.imageUrl"
              [alt]="project.title"
            />
          </div>
          <div class="p-6">
            <div class="flex flex-wrap gap-2 mb-4">
              @for (tag of project.tags; track tag) {
                <span
                  class="px-2 py-0.5 bg-slate-100 text-slate-600 text-[10px] font-bold uppercase rounded"
                >
                  {{ tag }}
                </span>
              }
            </div>
            <h3 class="text-xl font-bold text-slate-900 mb-2">
              {{ project.title }}
            </h3>
            <p class="text-slate-500 text-sm mb-6 line-clamp-3">
              {{ project.description }}
            </p>
            <a
              class="inline-flex items-center gap-2 text-primary font-bold text-sm group/btn"
              [href]="project.projectUrl"
              target="_blank"
              rel="noopener noreferrer"
            >
              View Project
              <img
                src="/assets/icons/arrow-right.svg"
                class="w-5 h-5"
                alt="Arrow icon"
              />
            </a>
          </div>
        </div>
      }
    </div>
  </div>
</section>
<app-footer />
